apiVersion: v1
kind: Namespace
metadata:
  labels:
    control-plane: kserve-controller-manager
    controller-tools.k8s.io: '1.0'
    istio-injection: disabled
  name: kserve
---
apiVersion: v1
data:
  _example: "################################\n#                              #\n\
    #    EXAMPLE CONFIGURATION     #\n#                              #\n################################\n\
    \n# This block is not actually functional configuration,\n# but serves to illustrate\
    \ the available configuration\n# options and document them in a way that is accessible\n\
    # to users that `kubectl edit` this config map.\n#\n# These sample configuration\
    \ options may be copied out of\n# this example block and unindented to be in the\
    \ data block\n# to actually change the configuration.\n\n# ======================================\
    \ EXPLAINERS CONFIGURATION ======================================\n# Example\n\
    explainers: |-\n  {\n      \"art\": {\n          \"image\" : \"kserve/art-explainer\"\
    ,\n          \"defaultImageVersion\": \"latest\"\n      }\n  }\n# Art Explainer\
    \ runtime configuration\n explainers: |-\n   {\n       # Art explainer runtime\
    \ configuration\n       \"art\": {\n           # image contains the default Art\
    \ explainer serving runtime image uri.\n           \"image\" : \"kserve/art-explainer\"\
    ,\n   \n           # defautltImageVersion contains the Art explainer serving runtime\
    \ default image version.\n           \"defaultImageVersion\": \"latest\"\n   \
    \    }\n   }\n# ====================================== ISVC CONFIGURATION ======================================\n\
    # Example - setting custom annotation  \n inferenceService: |-\n   {\n     \"\
    serviceAnnotationDisallowedList\": [\n        \"my.custom.annotation/1\"  \n \
    \    ],\n     \"serviceLabelDisallowedList\": [\n        \"my.custom.label.1\"\
    \  \n     ]\n   }\n# Example - setting custom annotation\ninferenceService: |-\n\
    \  {\n    # ServiceAnnotationDisallowedList is a list of annotations that are\
    \ not allowed to be propagated to Knative \n    # revisions, which prevents the\
    \ reconciliation loop to be triggered if the annotations is \n    # configured\
    \ here are used.\n    # Default values are:\n    #  \"autoscaling.knative.dev/min-scale\"\
    ,\n    #  \"autoscaling.knative.dev/max-scale\",\n    #  \"internal.serving.kserve.io/storage-initializer-sourceuri\"\
    ,\n    #  \"kubectl.kubernetes.io/last-applied-configuration\"\n    # Any new\
    \ value will be appended to the list.\n    \"serviceAnnotationDisallowedList\"\
    : [\n      \"my.custom.annotation/1\"  \n    ],\n    # ServiceLabelDisallowedList\
    \ is a list of labels that are not allowed to be propagated to Knative revisions\n\
    \    # which prevents the reconciliation loop to be triggered if the labels is\
    \ configured here are used.\n    \"serviceLabelDisallowedList\": [\n      \"my.custom.label.1\"\
    \  \n    ]\n  } \n# Example - setting custom resource\ninferenceService: |-\n\
    \  {\n    \"resource\": {\n      \"cpuLimit\": \"1\",\n      \"memoryLimit\":\
    \ \"2Gi\",\n      \"cpuRequest\": \"1\",\n      \"memoryRequest\": \"2Gi\"\n \
    \   }\n  }\n# Example - setting custom resource\ninferenceService: |-\n  {\n \
    \   # resource contains the default resource configuration for the inference service.\n\
    \    # you can override this configuration by specifying the resources in the\
    \ inference service yaml.\n    # If you want to unbound the resource (limits and\
    \ requests), you can set the value to null or \"\" \n    # or just remove the\
    \ specific field from the config.\n    \"resource\": {\n       # cpuLimit is the\
    \ limits.cpu to set for the inference service.\n       \"cpuLimit\": \"1\",\n\n\
    \       # memoryLimit is the limits.memory to set for the inference service.\n\
    \       \"memoryLimit\": \"2Gi\",\n\n       # cpuRequest is the requests.cpu to\
    \ set for the inference service.\n       \"cpuRequest\": \"1\",\n\n       # memoryRequest\
    \ is the requests.memory to set for the inference service.\n       \"memoryRequest\"\
    : \"2Gi\"\n    }\n }\n# ====================================== MultiNode CONFIGURATION\
    \ ======================================\n# Example   \nmultiNode: |-\n  {\n \
    \   \"customGPUResourceTypeList\": [\n      \"custom.com/gpu\"\n    ]\n  }\n#\
    \ Example of multinode configuration\nmultiNode: |-\n  {      \n    # CustomGPUResourceTypeList\
    \ is a list of custom GPU resource types intended to identify the GPU type of\
    \ a resource,\n    # not to restrict the user from using a specific GPU type.\n\
    \    # The MultiNode runtime pod will dynamically add GPU resources based on the\
    \ registered GPU types.\n    \"customGPUResourceTypeList\": [\n      \"custom.com/gpu\"\
    \n    ]\n  }  \n # ====================================== OTelCollector CONFIGURATION\
    \ ======================================\n # Example\n opentelemetryCollector:\
    \ |-\n   {\n     # scrapeInterval is the interval at which the OpenTelemetry Collector\
    \ will scrape the metrics.\n     \"scrapeInterval\": \"5s\",\n     # metricScalerEndpoint\
    \ is the endpoint from which the KEDA's ScaledObject will scrape the metrics.\n\
    \     \"metricScalerEndpoint\": \"keda-otel-scaler.keda.svc:4318\",\n     # metricReceiverEndpoint\
    \ is the endpoint from which the OpenTelemetry Collector will scrape the metrics.\n\
    \      \"metricReceiverEndpoint\": \"keda-otel-scaler.keda.svc:4317\"\n   }\n\n\
    \ # ====================================== AUTOSCALER CONFIGURATION ======================================\n\
    \ # Example\n autoscaler: |-\n   {\n     # scaleUpStabilizationWindowSeconds is\
    \ the stabilization window in seconds for scale up.\n     \"scaleUpStabilizationWindowSeconds\"\
    : \"0\",\n     # scaleDownStabilizationWindowSeconds is the stabilization window\
    \ in seconds for scale down.\n     \"scaleDownStabilizationWindowSeconds\": \"\
    300\"\n   }\n  \n # ====================================== STORAGE INITIALIZER\
    \ CONFIGURATION ======================================\n # Example\n storageInitializer:\
    \ |-\n   {\n       \"image\" : \"kserve/storage-initializer:v0.16.0\",\n     \
    \  \"memoryRequest\": \"100Mi\",\n       \"memoryLimit\": \"1Gi\",\n       \"\
    cpuRequest\": \"100m\",\n       \"cpuLimit\": \"1\",\n       \"caBundleConfigMapName\"\
    : \"\",\n       \"caBundleVolumeMountPath\": \"/etc/ssl/custom-certs\",\n    \
    \   \"enableModelcar\": false,\n       \"cpuModelcar\": \"10m\",\n       \"memoryModelcar\"\
    : \"15Mi\"\n   }\n storageInitializer: |-\n   {\n       # image contains the default\
    \ storage initializer image uri.\n       \"image\" : \"kserve/storage-initializer:v0.16.0\"\
    ,\n       \n       # memoryRequest is the requests.memory to set for the storage\
    \ initializer init container.\n       \"memoryRequest\": \"100Mi\",\n   \n   \
    \     # memoryLimit is the limits.memory to set for the storage initializer init\
    \ container.\n       \"memoryLimit\": \"1Gi\",\n       \n       # cpuRequest is\
    \ the requests.cpu to set for the storage initializer init container.\n      \
    \ \"cpuRequest\": \"100m\",\n       \n       # cpuLimit is the limits.cpu to set\
    \ for the storage initializer init container.\n       \"cpuLimit\": \"1\",\n \
    \  \n       # caBundleConfigMapName is the ConfigMap will be copied to a user\
    \ namespace for the storage initializer init container.\n       \"caBundleConfigMapName\"\
    : \"\",\n\n       # caBundleVolumeMountPath is the mount point for the configmap\
    \ set by caBundleConfigMapName for the storage initializer init container.\n \
    \      \"caBundleVolumeMountPath\": \"/etc/ssl/custom-certs\",\n\n       # enableModelcar\
    \ enabled allows you to directly access an OCI container image by\n       # using\
    \ a source URL with an \"oci://\" schema.\n       \"enableModelcar\": false,\n\
    \n       # cpuModelcar is the cpu request and limit that is used for the passive\
    \ modelcar container. It can be\n       # set very low, but should be allowed\
    \ by any Kubernetes LimitRange that might apply.\n       \"cpuModelcar\": \"10m\"\
    ,\n\n       # cpuModelcar is the memory request and limit that is used for the\
    \ passive modelcar container. It can be\n       # set very low, but should be\
    \ allowed by any Kubernetes LimitRange that might apply.\n       \"memoryModelcar\"\
    : \"15Mi\",\n\n       # uidModelcar is the UID under with which the modelcar process\
    \ and the main container is running.\n       # Some Kubernetes clusters might\
    \ require this to be root (0). If not set the user id is left untouched (default)\n\
    \       \"uidModelcar\": 10\n   }\n \n # ======================================\
    \ CREDENTIALS ======================================\n # Example\n credentials:\
    \ |-\n   {\n      \"storageSpecSecretName\": \"storage-config\",\n      \"storageSecretNameAnnotation\"\
    : \"serving.kserve.io/storageSecretName\",\n      \"gcs\": {\n          \"gcsCredentialFileName\"\
    : \"gcloud-application-credentials.json\"\n      },\n      \"s3\": {\n       \
    \   \"s3AccessKeyIDName\": \"AWS_ACCESS_KEY_ID\",\n          \"s3SecretAccessKeyName\"\
    : \"AWS_SECRET_ACCESS_KEY\",\n          \"s3Endpoint\": \"\",\n          \"s3UseHttps\"\
    : \"\",\n          \"s3Region\": \"\",\n          \"s3VerifySSL\": \"\",\n   \
    \       \"s3UseVirtualBucket\": \"\",\n          \"s3UseAccelerate\": \"\",\n\
    \          \"s3UseAnonymousCredential\": \"\",\n          \"s3CABundle\": \"\"\
    \n      }\n   }\n # This is a global configuration used for downloading models\
    \ from the cloud storage.\n # You can override this configuration by specifying\
    \ the annotations on service account or static secret.\n # https://kserve.github.io/website/master/modelserving/storage/s3/s3/\n\
    \ # For a quick reference about AWS ENV variables:\n # AWS Cli: https://docs.aws.amazon.com/cli/latest/userguide/cli-configure-envvars.html\n\
    \ # Boto: https://boto3.amazonaws.com/v1/documentation/api/latest/guide/configuration.html#using-environment-variables\n\
    \ #\n # The `s3AccessKeyIDName` and `s3SecretAccessKeyName` fields are only used\
    \ from this configmap when static credentials (IAM User Access Key Secret)\n #\
    \ are used as the authentication method for AWS S3.\n # The rest of the fields\
    \ are used in both authentication methods (IAM Role for Service Account & IAM\
    \ User Access Key Secret) if a non-empty value is provided.\n credentials: |-\n\
    \   {\n      # storageSpecSecretName contains the secret name which has the credentials\
    \ for downloading the model.\n      # This option is used when specifying the\
    \ storage spec on isvc yaml.\n      \"storageSpecSecretName\": \"storage-config\"\
    ,\n\n      # The annotation can be specified on isvc yaml to allow overriding\
    \ with the secret name reference from the annotation value.\n      # When using\
    \ storageUri the order of the precedence is: secret name reference annotation\
    \ > secret name references from service account\n      # When using storageSpec\
    \ the order of the precedence is: secret name reference annotation > storageSpecSecretName\
    \ in configmap\n\n      # Configuration for google cloud storage\n      \"gcs\"\
    : {\n          # gcsCredentialFileName specifies the filename of the gcs credential\n\
    \          \"gcsCredentialFileName\": \"gcloud-application-credentials.json\"\n\
    \      },\n      \n      # Configuration for aws s3 storage. This add the corresponding\
    \ environmental variables to the storage initializer init container.\n      #\
    \ For more info on s3 storage see https://kserve.github.io/website/master/modelserving/storage/s3/s3/\n\
    \      \"s3\": {\n          # s3AccessKeyIDName specifies the s3 access key id\
    \ name\n          \"s3AccessKeyIDName\": \"AWS_ACCESS_KEY_ID\",\n   \n       \
    \   # s3SecretAccessKeyName specifies the s3 secret access key name\n        \
    \  \"s3SecretAccessKeyName\": \"AWS_SECRET_ACCESS_KEY\",\n          \n       \
    \   # s3Endpoint specifies the s3 endpoint\n          \"s3Endpoint\": \"\",\n\
    \          \n          # s3UseHttps controls whether to use secure https or unsecure\
    \ http to download models.\n          # Allowed values are 0 and 1.\n        \
    \  \"s3UseHttps\": \"\",\n   \n          # s3Region specifies the region of the\
    \ bucket.\n          \"s3Region\": \"\",\n          \n          # s3VerifySSL\
    \ controls whether to verify the tls/ssl certificate.\n          \"s3VerifySSL\"\
    : \"\",\n          \n          # s3UseVirtualBucket configures whether it is a\
    \ virtual bucket or not.\n          \"s3UseVirtualBucket\": \"\",\n\n        \
    \  # s3UseAccelerate configures whether to use transfer acceleration.\n      \
    \    \"s3UseAccelerate\": \"\",\n           \n          # s3UseAnonymousCredential\
    \ configures whether to use anonymous credentials to download the model or not.\n\
    \          \"s3UseAnonymousCredential\": \"\",\n          \n          # s3CABundle\
    \ specifies the path to a certificate bundle to use for HTTPS certificate validation.\n\
    \          \"s3CABundle\": \"\"\n      }\n   }\n \n # ======================================\
    \ INGRESS CONFIGURATION ======================================\n # Example\n ingress:\
    \ |-\n   {    \n       \"enableGatewayApi\": false,\n       \"kserveIngressGateway\"\
    : \"kserve/kserve-ingress-gateway\",\n       \"ingressGateway\" : \"knative-serving/knative-ingress-gateway\"\
    ,\n       \"localGateway\" : \"knative-serving/knative-local-gateway\",\n    \
    \   \"localGatewayService\" : \"knative-local-gateway.istio-system.svc.cluster.local\"\
    ,\n       \"ingressDomain\"  : \"example.com\",\n       \"additionalIngressDomains\"\
    : [\"additional-example.com\", \"additional-example-1.com\"],\n       \"ingressClassName\"\
    \ : \"istio\",\n       \"domainTemplate\": \"{{ .Name }}-{{ .Namespace }}.{{ .IngressDomain\
    \ }}\",\n       \"urlScheme\": \"http\",\n       \"disableIstioVirtualHost\":\
    \ false,\n       \"disableIngressCreation\": false\n   }\n ingress: |-\n   { \
    \  \n       # enableGatewayApi specifies whether to use Gateway API instead of\
    \ Ingress to serve external traffic.\n       \"enableGatewayApi\": false,\n\n\
    \       # KServe implements [Gateway API](https://gateway-api.sigs.k8s.io/) to\
    \ serve external traffic. \n       # By default, KServe configures a default gateway\
    \ to serve external traffic.\n       # But, KServe can be configured to use a\
    \ custom gateway by modifying this configuration.\n       # The gateway should\
    \ be specified in format <gateway namespace>/<gateway name>\n       # NOTE: This\
    \ configuration only applicable for raw deployment.\n       \"kserveIngressGateway\"\
    : \"kserve/kserve-ingress-gateway\",\n \n       # ingressGateway specifies the\
    \ ingress gateway to serve external traffic.\n       # The gateway should be specified\
    \ in format <gateway namespace>/<gateway name>\n       # NOTE: This configuration\
    \ only applicable for serverless deployment with Istio configured as network layer.\n\
    \       \"ingressGateway\" : \"knative-serving/knative-ingress-gateway\",\n \n\
    \       # knativeLocalGatewayService specifies the hostname of the Knative's local\
    \ gateway service.\n       # The default KServe configurations are re-using the\
    \ Istio local gateways for Knative. In this case, this\n       # knativeLocalGatewayService\
    \ field can be left unset. When unset, the value of \"localGatewayService\" will\
    \ be used.\n       # However, sometimes it may be better to have local gateways\
    \ specifically for KServe (e.g. when enabling strict mTLS in Istio).\n       #\
    \ Under such setups where KServe is needed to have its own local gateways, the\
    \ values of the \"localGateway\" and\n       # \"localGatewayService\" should\
    \ point to the KServe local gateways. Then, this knativeLocalGatewayService field\n\
    \       # should point to the Knative's local gateway service.\n       # NOTE:\
    \ This configuration only applicable for serverless deployment with Istio configured\
    \ as network layer.\n       \"knativeLocalGatewayService\": \"\",\n \n       #\
    \ localGateway specifies the gateway which handles the network traffic within\
    \ the cluster.\n       # NOTE: This configuration only applicable for serverless\
    \ deployment with Istio configured as network layer.\n       \"localGateway\"\
    \ : \"knative-serving/knative-local-gateway\",\n \n       # localGatewayService\
    \ specifies the hostname of the local gateway service.\n       # NOTE: This configuration\
    \ only applicable for serverless deployment with Istio configured as network layer.\n\
    \       \"localGatewayService\" : \"knative-local-gateway.istio-system.svc.cluster.local\"\
    ,\n \n       # ingressDomain specifies the domain name which is used for creating\
    \ the url.\n       # If ingressDomain is empty then example.com is used as default\
    \ domain.\n       # NOTE: This configuration only applicable for raw deployment.\n\
    \       \"ingressDomain\"  : \"example.com\",\n\n       # additionalIngressDomains\
    \ specifies the additional domain names which are used for creating the url.\n\
    \       \"additionalIngressDomains\": [\"additional-example.com\", \"additional-example-1.com\"\
    ]\n\n       # ingressClassName specifies the ingress controller to use for ingress\
    \ traffic.\n       # This is optional and if omitted the default ingress in the\
    \ cluster is used.\n       # https://kubernetes.io/docs/concepts/services-networking/ingress/#default-ingress-class\n\
    \       # NOTE: This configuration only applicable for raw deployment.\n     \
    \  \"ingressClassName\" : \"istio\",\n \n       # domainTemplate specifies the\
    \ template for generating domain/url for each inference service by combining variable\
    \ from:\n       # Name of the inference service  ( {{ .Name}} )\n       # Namespace\
    \ of the inference service ( {{ .Namespace }} )\n       # Annotation of the inference\
    \ service ( {{ .Annotations.key }} )\n       # Label of the inference service\
    \ ( {{ .Labels.key }} )\n       # IngressDomain ( {{ .IngressDomain }} )\n   \
    \    # If domain template is empty the default template {{ .Name }}-{{ .Namespace\
    \ }}.{{ .IngressDomain }} is used.\n       # NOTE: This configuration only applicable\
    \ for raw deployment.\n       \"domainTemplate\": \"{{ .Name }}-{{ .Namespace\
    \ }}.{{ .IngressDomain }}\",\n \n       # urlScheme specifies the url scheme to\
    \ use for inference service and inference graph.\n       # If urlScheme is empty\
    \ then by default http is used.\n       \"urlScheme\": \"http\",\n \n       #\
    \ disableIstioVirtualHost controls whether to use istio as network layer.\n  \
    \     # By default istio is used as the network layer. When DisableIstioVirtualHost\
    \ is true, KServe does not\n       # create the top level virtual service thus\
    \ Istio is no longer required for serverless mode.\n       # By setting this field\
    \ to true, user can use other networking layers supported by knative.\n      \
    \ # For more info https://github.com/kserve/kserve/pull/2380, https://kserve.github.io/website/master/admin/serverless/kourier_networking/.\n\
    \       # NOTE: This configuration is only applicable to serverless deployment.\n\
    \       \"disableIstioVirtualHost\": false,\n\n       # disableIngressCreation\
    \ controls whether to disable ingress creation for raw deployment mode.\n    \
    \   \"disableIngressCreation\": false,\n \n       # pathTemplate specifies the\
    \ template for generating path based url for each inference service.\n       #\
    \ The following variables can be used in the template for generating url.\n  \
    \     # Name of the inference service  ( {{ .Name}} )\n       # Namespace of the\
    \ inference service ( {{ .Namespace }} )\n       # For more info https://github.com/kserve/kserve/issues/2257.\n\
    \       # NOTE: This configuration only applicable to serverless deployment.\n\
    \       \"pathTemplate\": \"/serving/{{ .Namespace }}/{{ .Name }}\"\n   }\n \n\
    \ # ====================================== LOGGER CONFIGURATION ======================================\n\
    \ # Example\n logger: |-\n   {\n       \"image\" : \"kserve/agent:v0.16.0\",\n\
    \       \"memoryRequest\": \"100Mi\",\n       \"memoryLimit\": \"1Gi\",\n    \
    \   \"cpuRequest\": \"100m\",\n       \"cpuLimit\": \"1\",\n       \"defaultUrl\"\
    : \"http://default-broker\"\n   }\n logger: |-\n   {\n       # image contains\
    \ the default logger image uri.\n       \"image\" : \"kserve/agent:v0.16.0\",\n\
    \   \n       # memoryRequest is the requests.memory to set for the logger container.\n\
    \       \"memoryRequest\": \"100Mi\",\n       \n       # memoryLimit is the limits.memory\
    \ to set for the logger container.\n       \"memoryLimit\": \"1Gi\",\n       \n\
    \       # cpuRequest is the requests.cpu to set for the logger container.\n  \
    \     \"cpuRequest\": \"100m\",\n       \n       # cpuLimit is the limits.cpu\
    \ to set for the logger container.\n       \"cpuLimit\": \"1\",\n       \n   \
    \    # defaultUrl specifies the default logger url. If logger is not specified\
    \ in the resource this url is used.\n       \"defaultUrl\": \"http://default-broker\"\
    \n   }\n \n # ====================================== BATCHER CONFIGURATION ======================================\n\
    \ # Example\n batcher: |-\n   {\n       \"image\" : \"kserve/agent:v0.16.0\",\n\
    \       \"memoryRequest\": \"1Gi\",\n       \"memoryLimit\": \"1Gi\",\n      \
    \ \"cpuRequest\": \"1\",\n       \"cpuLimit\": \"1\",\n       \"maxBatchSize\"\
    : \"32\",\n       \"maxLatency\": \"5000\"\n   }\n batcher: |-\n   {\n       #\
    \ image contains the default batcher image uri.\n       \"image\" : \"kserve/agent:v0.16.0\"\
    ,\n       \n       # memoryRequest is the requests.memory to set for the batcher\
    \ container.\n       \"memoryRequest\": \"1Gi\",\n   \n       # memoryLimit is\
    \ the limits.memory to set for the batcher container.\n       \"memoryLimit\"\
    : \"1Gi\",\n       \n       # cpuRequest is the requests.cpu to set for the batcher\
    \ container.\n       \"cpuRequest\": \"1\",\n       \n       # cpuLimit is the\
    \ limits.cpu to set for the batcher container.\n       \"cpuLimit\": \"1\"\n\n\
    \       # maxBatchSize is the default maximum batch size for batcher.\n      \
    \ \"maxBatchSize\": \"32\",\n\n       # maxLatency is the default maximum latency\
    \ in milliseconds for batcher to wait and collect the batch.\n       \"maxLatency\"\
    : \"5000\"\n   }\n \n # ====================================== AGENT CONFIGURATION\
    \ ======================================\n # Example\n agent: |-\n   {\n     \
    \  \"image\" : \"kserve/agent:v0.16.0\",\n       \"memoryRequest\": \"100Mi\"\
    ,\n       \"memoryLimit\": \"1Gi\",\n       \"cpuRequest\": \"100m\",\n      \
    \ \"cpuLimit\": \"1\"\n   }\n agent: |-\n   {\n       # image contains the default\
    \ agent image uri.\n       \"image\" : \"kserve/agent:v0.16.0\",\n   \n      \
    \ # memoryRequest is the requests.memory to set for the agent container.\n   \
    \    \"memoryRequest\": \"100Mi\",\n   \n       # memoryLimit is the limits.memory\
    \ to set for the agent container.\n       \"memoryLimit\": \"1Gi\",\n       \n\
    \       # cpuRequest is the requests.cpu to set for the agent container.\n   \
    \    \"cpuRequest\": \"100m\",\n       \n       # cpuLimit is the limits.cpu to\
    \ set for the agent container.\n       \"cpuLimit\": \"1\"\n   }\n \n # ======================================\
    \ ROUTER CONFIGURATION ======================================\n # Example\n router:\
    \ |-\n   {\n       \"image\" : \"kserve/router:v0.16.0\",\n       \"memoryRequest\"\
    : \"100Mi\",\n       \"memoryLimit\": \"1Gi\",\n       \"cpuRequest\": \"100m\"\
    ,\n       \"cpuLimit\": \"1\",\n       \"headers\": {\n         \"propagate\"\
    : []\n       },\n       \"imagePullPolicy\": \"IfNotPresent\",\n       \"imagePullSecrets\"\
    : [\"docker-secret\"]\n   }\n # router is the implementation of inference graph.\n\
    \ router: |-\n   {\n       # image contains the default router image uri.\n  \
    \     \"image\" : \"kserve/router:v0.16.0\",\n       \n       # memoryRequest\
    \ is the requests.memory to set for the router container.\n       \"memoryRequest\"\
    : \"100Mi\",\n       \n       # memoryLimit is the limits.memory to set for the\
    \ router container.\n       \"memoryLimit\": \"1Gi\",\n       \n       # cpuRequest\
    \ is the requests.cpu to set for the router container.\n       \"cpuRequest\"\
    : \"100m\",\n       \n       # cpuLimit is the limits.cpu to set for the router\
    \ container.\n       \"cpuLimit\": \"1\",\n       \n       # Propagate the specified\
    \ headers to all the steps specified in an InferenceGraph. \n       # You can\
    \ either specify the exact header names or use [Golang supported regex patterns]\n\
    \       # (https://pkg.go.dev/regexp/syntax@go1.21.3#hdr-Syntax) to propagate\
    \ multiple headers.\n       \"headers\": {\n         \"propagate\": [\n      \
    \      \"Authorization\",\n            \"Test-Header-*\",\n            \"*Trace-Id*\"\
    \n         ]\n       }\n\n       # imagePullPolicy specifies when the router image\
    \ should be pulled from registry.\n       \"imagePullPolicy\": \"IfNotPresent\"\
    ,\n       \n       # # imagePullSecrets specifies the list of secrets to be used\
    \ for pulling the router image from registry.\n       # https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/\n\
    \       \"imagePullSecrets\": [\"docker-secret\"]\n   }\n \n# ======================================\
    \ DEPLOYMENT CONFIGURATION ======================================\n# Example\n\
    deploy: |-\n  {\n    \"defaultDeploymentMode\": \"Serverless\",\n    \"deploymentRolloutStrategy\"\
    : {\n      \"defaultRollout\": {\n        \"maxSurge\": \"1\",\n        \"maxUnavailable\"\
    : \"1\"\n      }\n    }\n  }\n\ndeploy: |-\n  {\n    # defaultDeploymentMode specifies\
    \ the default deployment mode of the kserve. The supported values are\n    # Standard\
    \ and Knative. Users can override the deployment mode at service level\n    #\
    \ by adding the annotation serving.kserve.io/deploymentMode.\n    # \"defaultDeploymentMode\"\
    : \"Standard\",\n    # deploymentRolloutStrategy specifies the default rollout\
    \ strategy for the Standard deployment mode\n    # \"deploymentRolloutStrategy\"\
    : {\n      # defaultRollout specifies the default rollout configuration using\
    \ Kubernetes deployment strategy\n      # \"defaultRollout\": {\n        # maxSurge\
    \ specifies the maximum number of pods that can be created above the desired replica\
    \ count\n        # Can be an absolute number (ex: 5) or a percentage of desired\
