apiVersion: serving.kserve.io/v1alpha1
kind: LLMInferenceServiceConfig
metadata:
  name: kserve-config-llm-router-route
  namespace: kserve
spec:
  router:
    route:
      http:
        spec:
          parentRefs:
          - group: gateway.networking.k8s.io
            kind: Gateway
            name: '{{ .GlobalConfig.IngressGatewayName }}'
            namespace: '{{ .GlobalConfig.IngressGatewayNamespace }}'
          rules:
          - backendRefs:
            - group: inference.networking.x-k8s.io
              kind: InferencePool
              name: '{{ ChildName .ObjectMeta.Name `-inference-pool` }}'
              port: 8000
              weight: 1
            filters:
            - type: URLRewrite
              urlRewrite:
                path:
                  replacePrefixMatch: /
                  type: ReplacePrefixMatch
            matches:
            - path:
                type: PathPrefix
                value: /{{ .ObjectMeta.Namespace }}/{{ .ObjectMeta.Name }}
            timeouts:
              backendRequest: 0s
              request: 0s
---
apiVersion: serving.kserve.io/v1alpha1
kind: LLMInferenceServiceConfig
metadata:
  name: kserve-config-llm-scheduler
  namespace: kserve
spec:
  router:
    scheduler:
      pool:
        spec:
          extensionRef:
            failureMode: FailOpen
            kind: Service
            name: '{{ ChildName .ObjectMeta.Name `-epp-service` }}'
          selector: {}
          targetPortNumber: 8000
      template:
        containers:
        - args:
          - --poolName
          - '{{ ChildName .ObjectMeta.Name `-inference-pool` }}'
          - --poolNamespace
          - '{{ .ObjectMeta.Namespace }}'
          - --zap-encoder
          - json
          - --grpcPort
          - '9002'
          - --grpcHealthPort
          - '9003'
