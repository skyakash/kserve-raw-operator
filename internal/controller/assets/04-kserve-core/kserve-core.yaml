          \ No valid IPv4 ${KSERVE_INFER_IB_GID_INDEX_GREP} GID_INDEX found on any\
          \ HCA.\"\n      fi\n  else\n      echo \"[Infer RoCE] No active HCAs found,\
          \ skipping GID_INDEX inference.\"\n  fi\nfi\n\nSTART_RANK=$(( ${LWS_WORKER_INDEX:-0}\
          \ * {{ or .Spec.Prefill.Parallelism.DataLocal 1 }} ))\neval \"vllm serve\
