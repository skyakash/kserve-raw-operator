          \                      gid_value=$(cat \"$gid_file\" 2>/dev/null || echo\
          \ \"\")\n                      echo \"[Infer RoCE] Found IPv4 RoCE v2 GID\
          \ for ${hca_name}: index=${idx}, gid=${gid_value}\"\n                  \
          \    hca_gid_index[\"${hca_name}\"]=\"${idx}\"\n                      gid_index_count[\"\
          ${idx}\"]=$((${gid_index_count[\"${idx}\"]} + 1))\n                    \
          \  break  # Use first found IPv4 GID per HCA\n                  fi\n   \
          \           fi\n          done\n      done\n\n      # Find the most common\
          \ GID index (most likely to be consistent across nodes)\n      best_gid_index=\"\
          \"\n      max_count=0\n      for idx in \"${!gid_index_count[@]}\"; do\n\
          \          count=${gid_index_count[\"${idx}\"]}\n          echo \"[Infer\
          \ RoCE] GID_INDEX ${idx} found on ${count} HCAs\"\n          if [ $count\
          \ -gt $max_count ]; then\n              max_count=$count\n             \
          \ best_gid_index=\"$idx\"\n          fi\n      done\n\n      # Use deterministic\
          \ fallback if counts are equal - prefer lower index number  \n      if [\
          \ ${#gid_index_count[@]} -gt 1 ]; then\n          echo \"[Infer RoCE] Multiple\
          \ GID indices found, selecting most common: ${best_gid_index}\"\n      \
          \    # If there's a tie, prefer index 3 as it's most common in SR-IOV setups\n\
          \          if [ -n \"${gid_index_count['3']}\" ] && [ \"${gid_index_count['3']}\"\
          \ -eq \"$max_count\" ]; then\n              best_gid_index=\"3\"\n     \
          \         echo \"[Infer RoCE] Using deterministic fallback: GID_INDEX=3\
          \ (SR-IOV standard)\"\n          fi\n      fi\n\n      # Check if GID_INDEX\
          \ is already set via environment variables\n      if [ -n \"${NCCL_IB_GID_INDEX}\"\
          \ ]; then\n          echo \"[Infer RoCE] Using pre-configured NCCL_IB_GID_INDEX=${NCCL_IB_GID_INDEX}\
          \ from environment\"\n          export NVSHMEM_IB_GID_INDEX=${NVSHMEM_IB_GID_INDEX:-$NCCL_IB_GID_INDEX}\n\
          \          export UCX_IB_GID_INDEX=${UCX_IB_GID_INDEX:-$NCCL_IB_GID_INDEX}\n\
