              Cannot be updated.

              In CamelCase.

              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds'
            type: string
          metadata:
            type: object
          spec:
            description: 'InferenceModelSpec represents the desired state of a specific
              model use case. This resource is

              managed by the "Inference Workload Owner" persona.


              The Inference Workload Owner persona is someone that trains, verifies,
              and

              leverages a large language model from a model frontend, drives the lifecycle

              and rollout of new versions of those models, and defines the specific

              performance and latency goals for the model. These workloads are

              expected to operate within an InferencePool sharing compute capacity
              with other

              InferenceModels, defined by the Inference Platform Admin.


              InferenceModel''s modelName (not the ObjectMeta name) is unique for
              a given InferencePool,

              if the name is reused, an error will be shown on the status of a

              InferenceModel that attempted to reuse. The oldest InferenceModel, based
              on

              creation timestamp, will be selected to remain valid. In the event of
              a race

              condition, one will be selected at random.'
            properties:
              criticality:
                description: 'Criticality defines how important it is to serve the
