# permissions for end users to view kserverawmodes.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: clusterrole
    app.kubernetes.io/instance: kserverawmode-viewer-role
    app.kubernetes.io/component: rbac
    app.kubernetes.io/created-by: kserve-operator-deploy
    app.kubernetes.io/part-of: kserve-operator-deploy
    app.kubernetes.io/managed-by: kustomize
  name: kserverawmode-viewer-role
rules:
- apiGroups:
  - operator.akashdeo.com
  resources:
  - kserverawmodes
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - operator.akashdeo.com
  resources:
  - kserverawmodes/status
  verbs:
  - get
